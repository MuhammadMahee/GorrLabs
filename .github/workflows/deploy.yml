name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # Deploy (main branch only)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: SSH → git pull → docker compose up
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: 22
          script: |
            set -euo pipefail
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            echo "==> Pulling latest code"
            git pull origin main

            echo "==> Writing .env"
            cat > .env << 'EOF'
            ARKIVE_SECRET_KEY=${{ secrets.ARKIVE_SECRET_KEY }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            ARKIVE_PORT=${{ secrets.ARKIVE_PORT }}
            POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}
            OLLAMA_BASE_URL=http://localhost:11434
            OLLAMA_MODEL=qwen2.5:7b
            LOCAL_FALLBACK_MODEL=qwen2.5:7b
            LOCAL_ONLY_ABOVE_SENSITIVITY=3
            EOF

            echo "==> Rebuilding containers"
            docker compose up -d --build --remove-orphans

            echo "==> Pruning old images"
            docker image prune -f

            docker compose ps

      - name: Health check
        run: |
          echo "Waiting for app to start (up to 90s)..."
          for i in $(seq 1 9); do
            sleep 10
            echo "Attempt $i/9..."
            if curl -sf --max-time 10 \
              http://${{ secrets.VPS_HOST }}:${{ secrets.ARKIVE_PORT }}/health \
              | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('status') else 1)" 2>/dev/null; then
              echo "Health check passed"
              exit 0
            fi
          done
          echo "Health check failed after 90s"
          exit 1
