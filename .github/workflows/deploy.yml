name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # Build Docker image in CI and push to GHCR
  # ─────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase repo name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo.outputs.name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            USE_EMBEDDING_MODEL=BAAI/bge-large-en-v1.5
            USE_RERANKING_MODEL=BAAI/bge-reranker-v2-m3
          cache-from: type=registry,ref=ghcr.io/${{ steps.repo.outputs.name }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ steps.repo.outputs.name }}:buildcache,mode=max

  # ─────────────────────────────────────────
  # Deploy (pull pre-built image on VPS)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Lowercase repo name
        id: repo
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: SSH → pull image → docker compose up
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: 22
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            echo "==> Writing .env"
            cat > .env << 'ENVEOF'
            ARKIVE_SECRET_KEY=${{ secrets.ARKIVE_SECRET_KEY }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            ARKIVE_PORT=${{ secrets.ARKIVE_PORT }}
            POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}
            DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}
            OLLAMA_BASE_URL=http://ollama:11434
            ENABLE_OLLAMA_API=True
            ENABLE_OPENAI_API=False
            OPENAI_API_BASE_URL=
            OPENAI_API_KEY=
            ENABLE_EVALUATION_ARENA_MODELS=False
            CORS_ALLOW_ORIGIN=*
            FORWARDED_ALLOW_IPS=*
            SCARF_NO_ANALYTICS=true
            DO_NOT_TRACK=true
            ANONYMIZED_TELEMETRY=false
            ENABLE_RAG_HYBRID_SEARCH=true
            RAG_HYBRID_BM25_WEIGHT=0.5
            RAG_RELEVANCE_THRESHOLD=0.3
            RAG_EMBEDDING_MODEL=BAAI/bge-large-en-v1.5
            RAG_TOP_K=20
            RAG_RERANKING_MODEL=BAAI/bge-reranker-v2-m3
            RAG_TOP_K_RERANKER=5
            RAG_TEXT_SPLITTER=semantic
            ENABLE_CONTEXTUAL_ENRICHMENT=false
            ENABLE_BEDROCK_API=True
            AWS_BEDROCK_REGION=${{ secrets.AWS_BEDROCK_REGION }}
            AWS_BEDROCK_MODEL=${{ secrets.AWS_BEDROCK_MODEL }}
            AWS_BEDROCK_ENDPOINT_URL=
            AWS_BEDROCK_API_KEY=${{ secrets.AWS_BEDROCK_API_KEY }}
            LOCAL_FALLBACK_MODEL=${{ secrets.AWS_BEDROCK_MODEL }}
            LOCAL_ONLY_ABOVE_SENSITIVITY=1
            ENVEOF

            echo "==> Forcing Docker to use IPv4"
            sudo tee /etc/docker/daemon.json > /dev/null << 'DAEMONEOF'
            {"ipv6": false, "dns": ["8.8.8.8", "8.8.4.4"], "max-concurrent-downloads": 2}
            DAEMONEOF
            sudo systemctl restart docker
            sleep 5

            echo "==> Logging in to GHCR"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "==> Pulling pre-built image"
            for attempt in 1 2 3; do
              docker pull ghcr.io/${{ steps.repo.outputs.name }}:latest && break
              echo "Pull attempt $attempt failed, retrying in 15s..."
              sleep 15
            done

            echo "==> Updating compose to use pre-built image"
            export ARKIVE_IMAGE=ghcr.io/${{ steps.repo.outputs.name }}:latest

            echo "==> Starting containers"
            docker compose up -d --no-build --remove-orphans

            echo "==> Pruning old images"
            docker image prune -f

            docker compose ps

      - name: Health check
        run: |
          echo "Waiting for app to start (up to 5 min)..."
          for i in $(seq 1 30); do
            sleep 10
            echo "Attempt $i/30..."
            if curl -sf --max-time 10 \
              http://${{ secrets.VPS_HOST }}:${{ secrets.ARKIVE_PORT }}/health \
              2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if d.get('status') else 1)" 2>/dev/null; then
              echo "Health check passed"
              exit 0
            fi
          done
          echo "Health check failed after 5 minutes"
          exit 1
