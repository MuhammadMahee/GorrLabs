<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Share Your Experience — Gorr Labs</title>

<link rel="icon" type="image/png" href="/static/logo.png"/>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

/* ---------------- THEME VARIABLES ---------------- */
:root{
  --black:#060608;
  --card:#101014;
  --white:#F5F5F7;
  --muted:rgba(255,255,255,.6);

  --red:#FF2D2D;
  --orange:#FF6B00;
  --yellow:#FFD60A;

  --fire:linear-gradient(135deg,#FF2D2D,#FF6B00 50%,#FFD60A);

  --fd:'Orbitron',monospace;
  --fu:'Rajdhani',sans-serif;
  --fb:'Inter',sans-serif;
}

/* LIGHT MODE */
body.light{
  --black:#F4F8FB;
  --card:#FFFFFF;
  --white:#09131A;
  --muted:rgba(9,19,26,.65);

  --red:#00B7FF;
  --orange:#00D4FF;
  --yellow:#14E7B2;

  --fire:linear-gradient(135deg,#00B7FF,#00D4FF 50%,#14E7B2);
}

/* ---------------- BASE ---------------- */
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--black);
  color:var(--white);
  font-family:var(--fb);
  transition:background .35s,color .35s;
}

/* BACKGROUND */
.orb{position:fixed;border-radius:50%;filter:blur(100px);opacity:.08;pointer-events:none;}
.orb.a{width:600px;height:600px;background:radial-gradient(var(--red),transparent);top:-250px;left:-180px;}
.orb.b{width:500px;height:500px;background:radial-gradient(var(--orange),transparent);bottom:-150px;right:-150px;}

.grid{
  position:fixed;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,107,0,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,107,0,.025) 1px, transparent 1px);
  background-size:60px 60px;
}

/* NAV */
.nav{
  position:fixed;top:0;left:0;right:0;height:72px;
  display:flex;justify-content:space-between;align-items:center;
  padding:0 5%;
  background:rgba(10,10,10,.72);
  backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(255,255,255,.05);
  z-index:1000;
}

body.light .nav{
  background:rgba(244,248,251,.75);
  border-bottom:1px solid rgba(0,0,0,.06);
}

.logo{
  display:flex;align-items:center;gap:12px;text-decoration:none;
}

.logo img{
  width:38px;height:38px;object-fit:contain;
  filter:brightness(0) invert(1);
}

body.light .logo img{filter:none;}

.logo span{
  font-family:var(--fd);
  letter-spacing:4px;
  background:var(--fire);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* THEME TOGGLE */
.theme-toggle{
  width:52px;height:28px;
  border-radius:50px;
  border:none;
  background:rgba(255,107,0,.12);
  border:1px solid rgba(255,107,0,.25);
  display:flex;align-items:center;
  padding:0 3px;
  cursor:pointer;
}

.toggle-knob{
  width:22px;height:22px;
  border-radius:50%;
  background:var(--orange);
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;
  transition:.3s;
}

/* PAGE */
.page{
  max-width:900px;
  margin:auto;
  padding:130px 5% 80px;
}

/* HERO */
.hero{text-align:center;margin-bottom:3rem;}
.hero h1{font-family:var(--fd);font-size:clamp(2rem,5vw,4rem);}
.fire{-webkit-background-clip:text;-webkit-text-fill-color:transparent;background:var(--fire);}
.hero p{color:var(--muted);line-height:1.8;}

/* FORM */
.form-box{
  background:var(--card);
  border:1px solid rgba(255,255,255,.06);
  border-radius:24px;
  padding:2.5rem;
}

.row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}

.fg{margin-bottom:1.2rem;}

.fg label{
  display:block;
  margin-bottom:.6rem;
  color:var(--muted);
  font-size:.78rem;
  letter-spacing:2px;
}

.fg input,.fg textarea,.fg select{
  width:100%;
  padding:14px 16px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  color:var(--white);
  outline:none;
}

.fg textarea{min-height:160px;resize:vertical;}

.btn{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  background:var(--fire);
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

/* STATUS */
.status{
  margin-top:1rem;
  text-align:center;
  display:none;
  padding:14px;
  border-radius:12px;
}

.status.ok{
  display:block;
  background:rgba(0,200,100,.08);
  border:1px solid rgba(0,200,100,.25);
  color:#00d26a;
}

.status.err{
  display:block;
  background:rgba(255,45,45,.08);
  border:1px solid rgba(255,45,45,.25);
  color:#ff4b4b;
}

@media(max-width:768px){
  .row{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<div class="orb a"></div>
<div class="orb b"></div>
<div class="grid"></div>

<!-- NAV -->
<nav class="nav">
  <a href="/" class="logo">
    <img id="mainLogo" src="/static/logo.png">
    <span>GORR LABS</span>
  </a>

  <button class="theme-toggle" onclick="toggleTheme()">
    <div class="toggle-knob" id="toggleIcon">🌙</div>
  </button>
</nav>

<!-- PAGE -->
<div class="page">

  <div class="hero">
    <h1>Share Your <span class="fire">Experience</span></h1>
    <p>We'd love to hear your feedback about working with Gorr Labs.</p>
  </div>

  <div class="form-box">

    <div class="row">
      <div class="fg">
        <label>Full Name</label>
        <input id="name" type="text">
      </div>

      <div class="fg">
        <label>Company / Role</label>
        <input id="role" type="text">
      </div>
    </div>

    <div class="fg">
      <label>Rating</label>
      <select id="rating">
        <option value="5">★★★★★ Excellent</option>
        <option value="4">★★★★☆ Very Good</option>
        <option value="3">★★★☆☆ Good</option>
        <option value="2">★★☆☆☆ Fair</option>
        <option value="1">★☆☆☆☆ Poor</option>
      </select>
    </div>

    <div class="fg">
      <label>Message</label>
      <textarea id="message"></textarea>
    </div>

    <button class="btn" onclick="submitFeedback()">Submit Feedback</button>

    <div class="status" id="status"></div>

  </div>

</div>

<script>

/* ---------------- THEME ---------------- */
function applyTheme(mode){

  const body=document.body;
  const logo=document.getElementById('mainLogo');
  const icon=document.getElementById('toggleIcon');

  if(mode==='light'){
    body.classList.add('light');
    logo.src='/static/Black_Logo.png';
    icon.textContent='☀️';
  }else{
    body.classList.remove('light');
    logo.src='/static/logo.png';
    icon.textContent='🌙';
  }
}

function toggleTheme(){
  const next = document.body.classList.contains('light') ? 'dark' : 'light';
  localStorage.setItem('theme',next);
  applyTheme(next);
}

document.addEventListener("DOMContentLoaded",()=>{
  applyTheme(localStorage.getItem('theme')||'dark');
});


/* ---------------- FEEDBACK ---------------- */
async function submitFeedback(){

  const name=document.getElementById('name').value.trim();
  const role=document.getElementById('role').value.trim();
  const rating=document.getElementById('rating').value;
  const message=document.getElementById('message').value.trim();
  const status=document.getElementById('status');

  status.style.display='block';

  if(!name || !message){
    status.className='status err';
    status.textContent='Please fill required fields.';
    return;
  }

  try{

    const res = await fetch('/submit-feedback',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,role,rating,message})
    });

    let d;
    try{ d = await res.json(); }
    catch{ d = {success:false,error:"Invalid response"}; }

    if(d.success){
      status.className='status ok';
      status.textContent='Thank you for your feedback!';

      name.value='';
      role.value='';
      message.value='';
    }else{
      status.className='status err';
      status.textContent=d.error || 'Something went wrong.';
    }

  }catch(err){
    status.className='status err';
    status.textContent='Network error.';
  }
}

</script>

</body>
</html>
